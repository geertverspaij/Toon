<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Folders</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        a { display: block; margin: 8px 0; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Folders</h1>
    <div id="list"></div>

    <script>
        fetch("/api/list")
            .then(r => r.json())
            .then(folders => {
                const div = document.getElementById("list");
                folders.forEach(f => {
                    const a = document.createElement("a");
                    a.href = f + "/";
                    a.textContent = f;
                    div.appendChild(a);
                });
            });
    </script>
</body>
</html>
